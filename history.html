<!DOCTYPE html>
<html>
<head>
<title>Order History</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2
}

.box{
width:90%;
margin:auto;
margin-top:30px;
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.order{
background:#fff3e0;
padding:15px;
margin:12px 0;
border-radius:10px;
border-left:6px solid #ff5722;
}
</style>
</head>

<body>

<div class="box">
<h2>📦 Your Orders</h2>
<div id="orderList"></div>
</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let html="";

orders.forEach(o=>{
html += `
<div class="order">
<b>${o.name}</b> — ${o.date}
<p>📱 ${o.mobile}</p>
<p>📍 ${o.address}</p>
<p>Items: ${o.items.length}</p>
</div>`;
});

document.getElementById("orderList").innerHTML = html;

</script>

</body>
</html>
