<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body{
    font-family:Arial;
    background:#f2f2f2
}

.header{
background:#171a29;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.table{
width:90%;
margin:auto;
background:white;
margin-top:20px;
padding:20px;
border-radius:12px;
}

table{
    width:100%;
    border-collapse:collapse
}
th,td{padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.del{
    background:red;
    color:white
}
.done{
    background:green;
    color:white
    }
</style>
</head>

<body>

<div class="header">Admin Dashboard 👑</div>

<div class="table">

<table id="ordersTable">
    <div id="adminOrders">
        
    </div>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>Status</th>
<th>Action</th>
</tr>
</table>

</div>

<script src="admin.js"></script>

</body>
</html>
