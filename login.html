<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#ff7e5f,#feb47b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:30px;
border-radius:14px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

h2{
color:#ff5722;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#ff5722;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e64a19;
}

.link{
margin-top:12px;
font-size:14px;
}

.link a{
color:#ff5722;
font-weight:bold;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

<h2>Login 🔐</h2>

<input id="luser" placeholder="Email or Username">
<input id="lpass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="link">
No account?
<a href="signup.html">Create Account</a>
</div>

</div>

<script>

function login(){

let account = JSON.parse(localStorage.getItem("account"));

if(!account){
alert("No account found. Please sign up first.");
return;
}


if(luser.value == account.email && lpass.value == account.password){


localStorage.setItem("user", account.name);


window.location = "index.html";

}else{
alert("Wrong Email or Password");
}
}
</script>

</body>
</html>
