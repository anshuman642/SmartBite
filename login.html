<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - SmartBite</title>

<style>
body{
font-family:Arial;
background:#171a29;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
color:black;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

h2{color:#ff5722}

input{
padding:12px;
margin:10px;
width:220px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 25px;
background:#ff5722;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

p{margin-top:10px}
</style>
</head>

<body>

<div class="box">

<h2>SmartBite Login 🍔</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<script>

function login(){

let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u=="" || p==""){
document.getElementById("msg").innerText =
"⚠ Please enter username & password";
return;
}

// Save username
localStorage.setItem("user", u);

// Redirect to home page
window.location = "index.html";
}

</script>

</body>
</html>
