<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body{
    font-family:Arial;
    background:#171a29;
    color:white;
    text-align:center;
    padding-top:100px
}
input{
    padding:10px;
    margin:10px;
    border-radius:6px;
    border:none
}
button{
    padding:10px 20px;
    background:#ff5722;
    color:white;
    border:none;
    border-radius:8px}
</style>
</head>

<body>

<h2>Admin Login 🔐</h2>

<input id="aid" placeholder="Admin ID"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<script>
function login(){
if(aid.value=="admin" && pass.value=="0011"){
window.location="admin.html";
}else{
alert("Wrong ID or Password");
}
}
</script>

</body>
</html>
